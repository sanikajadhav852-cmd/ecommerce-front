<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <!--
      DARK MODE INIT SCRIPT
      Runs before React loads so there is zero "flash" of the wrong theme.
      Reads the saved theme from localStorage (set by themeStore.js / Zustand)
      and immediately applies the .dark class to <html>.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme-storage');
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.state && parsed.state.theme === 'dark') {
              document.documentElement.classList.add('dark');
            }
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
